version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: redteam
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: supersecurepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://redteam:supersecurepass@postgres:5432/redteam
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/app
    env_file:
      - .env

  celery_worker:
    build: .
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://redteam:supersecurepass@postgres:5432/redteam
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./:/app
    env_file:
      - .env

  celery_beat:
    build: .
    command: celery -A app.tasks.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://redteam:supersecurepass@postgres:5432/redteam
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./:/app
    env_file:
      - .env

  flower:
    build: .
    command: celery -A app.tasks.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data: