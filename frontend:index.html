<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA-RED | Advanced Red Team Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">Ω</div>
                <div class="logo-text">OMEGA<span>-RED</span></div>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="targets">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
                    <span>Targets</span>
                </a>
                <a href="#" class="nav-item" data-page="campaigns">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    <span>Campaigns</span>
                </a>
                <a href="#" class="nav-item" data-page="intel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6M12 2v8m0 0l-3-3m3 3l3-3"/></svg>
                    <span>Intel Hub</span>
                </a>
                <a href="#" class="nav-item" data-page="analytics">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3M12 2v8m0 0l-3-3m3 3l3-3"/></svg>
                    <span>Analytics</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span>System Online</span>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l4-4-4-4M12 13h8"/></svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Login Screen -->
            <div id="loginScreen" class="login-screen">
                <div class="login-card">
                    <div class="login-header">
                        <div class="login-logo">Ω</div>
                        <h1>OMEGA-RED</h1>
                        <p>Advanced Red Team Operations Platform</p>
                    </div>
                    <form id="loginForm">
                        <div class="input-group">
                            <input type="text" id="username" placeholder="Username" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn-primary">Authenticate</button>
                    </form>
                    <div class="login-footer">
                        <span>🔒 Harvard-MIT Red Team Certification</span>
                    </div>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div id="appContent" style="display: none;">
                <header class="top-bar">
                    <div class="page-title">
                        <h1 id="pageTitle">Dashboard</h1>
                    </div>
                    <div class="user-info">
                        <div class="api-key-display">
                            <code id="apiKeyDisplay">API Key: ********</code>
                            <button onclick="copyApiKey()" class="icon-btn">📋</button>
                        </div>
                        <div class="avatar">RA</div>
                    </div>
                </header>

                <div id="pageContent">
                    <!-- Dynamic content loads here -->
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
